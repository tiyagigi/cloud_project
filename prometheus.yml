global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'nginx-prometheus-exporter'
    static_configs:
      # In a real environment, this would point to the Nginx Exporter sidecar or Deployment.
      # Here we assume an exporter running locally for testing.
      - targets: ['nginx-exporter:9113']
    metrics_path: /metrics

# Note regarding Phase 5:
# To alert or monitor specifically for 404s, you would use a PromQL query like:
# sum(rate(nginx_http_requests_total{status="404"}[5m]))
