server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Security Headers (Phase 4 Deploy Requirement)
    
    # HSTS (Strict-Transport-Security)
    # The requirement specifically asks for HSTS. In a real environment, this enforces HTTPS.
    # We include `max-age=31536000; includeSubDomains; preload` for best practices.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # CSP (Content-Security-Policy) 
    # Allowing styles from cdn.tailwindcss.com and inline styles/scripts for Tailwind to function properly.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;

    # Other Recommended Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Serving the static site
    location / {
        try_files $uri $uri/ =404;
    }

    # Error pages (Phase 5 prep: mapping 404s clearly)
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
    }

    # Location needed for basic Nginx prometheus metrics stub (Phase 5)
    location /stub_status {
        stub_status;
        allow all; # In production, restrict this to prometheus subnets
    }
}
